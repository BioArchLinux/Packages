build_prefix: extra-x86_64
maintainers:
  - github: starsareintherose
    email: kuoi@bioarchlinux.org
pre_build_script: |
  update_pkgver_and_pkgrel(_G.newver.lstrip('v'))
post_build_script: |
  git_pkgbuild_commit()
update_on:
  - source: github
    github: faircloth-lab/phyluce
    use_max_tag: true
  - alias: python
repo_depends:
  - python-biopython
  - python-bx
  - python-dendropy
  - python-future
  - velvet
  - trimmomatic
  - trimal
  - spades
  - seqtk
  - samtools
  - raxml-ng
  - abyss
  - bcftools
  - bedtools
  - bwa
  - gblocks
  - htslib
  - lastz
  - mafft
  - muscle
  - pilon
  - illumiprocessor
  - snakemake
