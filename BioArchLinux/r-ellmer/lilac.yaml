build_prefix: extra-x86_64
maintainers:
  - github: bshor
    email: boris@bshor.com
pre_build_script: |
  update_pkgver_and_pkgrel(_G.newver)
post_build_script: |
  git_pkgbuild_commit()
repo_depends:
  - r-cli
  - r-coro
  - r-glue
  - r-httr2
  - r-jsonlite
  - r-later
  - r-lifecycle
  - r-promises
  - r-r6
  - r-rlang
  - r-s7
  - r-tibble
  - r-vctrs
update_on:
  - source: rpkgs
    pkg: ellmer
    repo: cran
    md5: true
  - alias: r
